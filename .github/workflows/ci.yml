name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint (eslint + input-font + contrast checks)
        run: pnpm lint

      - name: Test (with coverage)
        run: pnpm test --coverage

      - name: Build
        run: pnpm build
        env:
          # Placeholders — the app is fully dynamic, so no real services are
          # contacted at build time. Real values live in Vercel project env.
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ZXhhbXBsZS5jbGVyay5hY2NvdW50cy5kZXYk
          CLERK_SECRET_KEY: sk_test_placeholder_ci_key
          CRON_SECRET: ci-placeholder-cron-secret-000000000000
          AI_GATE_MODE: block
